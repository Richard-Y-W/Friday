name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -v

      - name: Run Jarvis eval suite
        run: |
          python3 -m jarvis_research eval-suite run
          python3 -m jarvis_research eval-suite run --suite biomedical
          python3 -m jarvis_research eval-suite run --suite natural-language
          python3 -m jarvis_research eval-suite run --suite safety
          python3 -m jarvis_research eval-suite run --suite gold
          python3 -m jarvis_research eval-suite run --suite real-smoke
